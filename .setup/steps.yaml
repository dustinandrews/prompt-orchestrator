title: "{project_name}"
log_level: DEBUG #"DEBUG", "INFO", "WARN", "ERROR"
message: "K.I.S.S. DO NOT ask clarifying questions. Make decisions and proceed."
models:
  - reviewer-model:
      model: "moonshotai/kimi-k2-turbo-preview"
  - coder-model:
      model: "groq/openai/gpt-oss-20b"
      #"ollama/qwen3.5:35b"
  

commands:
  - command: "/speckit.specify"
    model: reviewer-model
    files:
      - ".opencode/command/speckit.specify.md"
      - ".specify/templates/spec-template.md"
      - "userspec.md"
      # opencode run --log-level INFO -f userspec.md -f .opencode/command/speckit.specify.md -f .specify/templates/spec-template.md --model moonshotai/kimi-k2-turbo-preview "K.I.S.S. DO NOT ask clarifying questions. Make decisions and proceed."

  - command: "-*-verify-*-" # This is a special token to intercept and check for files listed 
# Run the following and parse the FEATURE_DIR. 
# .specify/scripts/bash/check-prerequisites.sh --json --require-tasks --include-tasks 
# {"FEATURE_DIR":"/home/nanobot/.nanobot/workspace/projects/BlogTest/specs/002-mdblog-generator","AVAILABLE_DOCS":["research.md","data-model.md","contracts/","quickstart.md"]}
# check for the files, fail and bail if they are not present.
    model: null
    files:
      - "spec.md"

  - command: "/speckit.spec-review"
    model: coder-model
    files:
      - ".opencode/command/speckit.spec-review.md"
      - ".specify/templates/spec-review-template.md"

  - command: "/compact"
    model: coder-model

  - command: "/speckit.plan"
    model: coder-model
    files:
      - ".opencode/command/speckit.plan.md"
      - ".specify/templates/plan-template.md"

  - command: "-*-verify-*-" 
    model: null
    files:
      - "plan.md"

  - command: "/speckit.plan-review"
    model: coder-model
    files:
      - ".opencode/command/speckit.plan-review.md"
      - ".specify/templates/plan-review-template.md"

  - command: "/compact"
    model: coder-model

  - command: "/speckit.tasks"
    model: coder-model
    files:
      - ".opencode/command/speckit.tasks.md"
      - ".specify/templates/tasks-template.md"

  - command: "-*-verify-*-" 
    model: null
    files:
      - "tasks.md"

  - command: "/speckit.analyze"
    model: coder-model
    files:
      - ".opencode/command/speckit.analyze.md"

  - command: "/speckit.tasks-review"
    model: coder-model
    files:
      - ".opencode/command/speckit.tasks-review.md"
      - ".specify/templates/tasks-review-template.md"

  - command: "/compact"
    model: coder-model

  - command: "/speckit.implement"
    model: coder-model
    files:
      - ".opencode/command/speckit.implement.md"

  - command: "-*-verify-*-implementation" # check that stub files are filled in, fail and bail if not.
    model: null
    
  - command: "/compact"
    model: coder-model

  - command: "/speckit.test-review"
    model: coder-model
    files:
      - ".opencode/command/speckit.test-review.md"

  - command: "/speckit.product-review"
    model: reviewer-model
    files:
      - ".opencode/command/speckit.product-review.md"
