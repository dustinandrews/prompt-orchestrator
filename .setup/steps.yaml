description: This is a definition of the steps for the speckit process. It is proccessed by a script. **DO NOT** attempt to execute this manually.
title: {project_name}
debug: true # true/false (enables --debug flag)
message: K.I.S.S. DO NOT ask clarifying questions. Make decisions and proceed.
max_retries_per_validation: 3
models:
  - reviewer-model:
      model: ollama/qwen3.5:35b 
      #moonshotai/kimi-k2.5
  - coder-model: 
      model: ollama/qwen3.5:35b
      # openrouter/deepseek/deepseek-v3.2 Good coding model, but relatively expensive.
      #openrouter/openai/gpt-5.4-mini  may need setting temperature. Over ambitious, may not follow instructions well.
      #openrouter/qwen/qwen3-coder-flash fast but gets confused
      #ollama/qwen3.5:35b slow but good, punches above its weight.

commands:
  - step: specify
    model: reviewer-model
    files:
      - .orchestrator/command/speckit.specify.md
      - .orchestrator/templates/spec-template.md
      - userspec.md
    verify:
      files:
        - spec.md
      retry_step_on_file_not_found: specify

  - step: spec-review
    model: reviewer-model
    files:
      - .orchestrator/command/speckit.spec-review.md
      - .orchestrator/templates/spec-review-template.md
    verify:
      files:
        - spec-review.md
      retry_step_on_fail: specify
      retry_step_on_file_not_found: spec-review

  - step: plan
    model: coder-model
    files:
      - .orchestrator/command/speckit.plan.md
      - .orchestrator/templates/plan-template.md
    verify:
      files:
        - plan.md
      retry_step_on_file_not_found: plan

  - step: plan-review
    model: reviewer-model
    files:
      - .orchestrator/command/speckit.plan-review.md
      - .orchestrator/templates/plan-review-template.md
    verify:
      files:
        - plan-review.md
      retry_step_on_fail: plan
      retry_step_on_file_not_found: plan-review

  - step: tasks
    model: coder-model
    files:
      - .orchestrator/command/speckit.tasks.md
      - .orchestrator/templates/tasks-template.md
    verify:
      files:
        - tasks.md
      retry_step_on_file_not_found: tasks

  - step: analyze
    model: coder-model
    files:
      - .orchestrator/command/speckit.analyze.md

  - step: tasks-review
    model: reviewer-model
    files:
      - .orchestrator/command/speckit.tasks-review.md
      - .orchestrator/templates/tasks-review-template.md
    verify:
      files:
        - tasks-review.md
      retry_step_on_fail: tasks
      retry_step_on_file_not_found: tasks-review

  - step: implement
    model: coder-model
    files:
      - .orchestrator/command/speckit.implement.md
    verify_implementation: true
    retry_step_on_fail: implement

  - step: test-review
    model: reviewer-model
    files:
      - .orchestrator/command/speckit.test-review.md
      - .orchestrator/templates/test-review-template.md
    verify:
      files:
        - test-review.md
      retry_step_on_fail: implement
      retry_step_on_file_not_found: test-review

  - step: product-review
    model: reviewer-model
    files:
      - .orchestrator/command/speckit.product-review.md
      - .orchestrator/templates/product-review-template.md
    verify:
      files:
        - product-review.md
      retry_step_on_fail: implement
      retry_step_on_file_not_found: product-review
